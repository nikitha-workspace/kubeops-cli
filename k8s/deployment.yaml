apiVersion: apps/v1
kind: Deployment

metadata:
  name: kubeops-cli

spec:
  replicas: 2

  selector:
    matchLabels:
      app: kubeops-cli

  template:
    metadata:
      labels:
        app: kubeops-cli

    spec:
      containers:
      - name: kubeops-cli

        image: nikithatellatakula7685678587/kubeops-cli:latest

        imagePullPolicy: Always